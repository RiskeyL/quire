# Quire brand-token file — example for Dify documentation.
# Every key is optional; omitted keys fall back to built-in defaults.
# Replace the color and font values below with your real brand values.
# These are EXAMPLE values only and do not represent official Dify brand guidelines.

page:
  size: A4            # Page size: A4 or Letter — sets PDF @page size
  margin: "2cm"       # Uniform page margin applied to the PDF (@page margin)

colors:
  text: "#1a1a1a"     # Body text color — PDF (CSS color) and Word (Normal style)
  heading: "#111827"  # Heading color — PDF headings and Word Heading1–Heading6 styles
  link: "#2563eb"     # Hyperlink color — PDF only (Word preserves its own link style)
  accent: "#2563eb"   # Reserved for rules and accent elements — PDF only
  muted: "#6b7280"    # Captions and secondary descriptions — PDF only

typography:
  bodyFont: "Georgia, 'Times New Roman', serif"      # Body font stack — PDF uses full stack; Word uses the first family name
  headingFont: "Helvetica, Arial, sans-serif"        # Heading font stack — PDF and Word heading styles
  monoFont: "'SFMono-Regular', Consolas, monospace"  # Code/pre font stack — PDF and Word VerbatimChar style
  baseSize: "11pt"    # Base body font size — PDF (CSS font-size) and Word (docDefaults sz)
  lineHeight: 1.5     # Body line height — PDF only (Word uses its own paragraph spacing)

toc:
  title: "Contents"   # Heading text displayed above the table of contents (PDF only; Word uses Pandoc's native TOC, which supplies its own heading).

# meta:
#   showDescription: true  # Render each page's frontmatter description as a visible lede beneath its title. Override per run with --no-description.
