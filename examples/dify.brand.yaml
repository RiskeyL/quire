# Quire brand-token file — example for Dify documentation.
# Every key is optional; omitted keys fall back to built-in defaults.
# Replace the color and font values below with your real brand values.
# These are EXAMPLE values only and do not represent official Dify brand guidelines.

page:
  size: A4            # Page size: A4 or Letter — sets PDF @page size
  margin: "2cm"       # Uniform page margin applied to the PDF (@page margin)

colors:
  text: "#1a1a1a"     # Body text color — PDF (CSS color) and Word (docDefaults)
  heading: "#111827"  # Heading color — PDF headings and Word Heading1–Heading6 styles
  link: "#2563eb"     # Hyperlink color — PDF links and the Word Hyperlink style
  accent: "#2563eb"   # Accent — PDF rules/accents, Word Info callout border + blockquote bar
  muted: "#6b7280"    # Captions/secondary text — PDF, plus Word blockquote + page-description
  surface: "#f2f2f2"  # Light fills — code blocks, callouts, panels, table header row (PDF and Word)
  border: "#d9d9d9"   # Hairlines — table cells, card/panel borders, hr, separators (PDF and Word)

semantic:
  success: "#15803d"  # Tip and Check callouts — PDF left bar and Word accent bar
  caution: "#b45309"  # Note callout and the required-field badge
  danger: "#b91c1c"   # Warning and Danger callouts

shape:
  radius: "4px"       # Corner radius for code, callouts, cards, panels, badges. PDF only (Word corners are square); "0" = sharp.

typography:
  bodyFont: "Georgia, 'Times New Roman', serif"      # Body font stack — PDF uses full stack; Word uses the first family name
  headingFont: "Helvetica, Arial, sans-serif"        # Heading font stack — PDF and Word heading styles
  monoFont: "Consolas, 'SF Mono', Menlo, monospace"  # Code/pre font stack. Consolas leads so Word's VerbatimChar resolves a real mono; the PDF (Chromium) falls through to SF Mono / Menlo.
  baseSize: "11pt"    # Base body font size — PDF (CSS font-size) and Word (docDefaults sz)
  lineHeight: 1.5     # Body line height — PDF only (Word uses its own paragraph spacing)

toc:
  title: "Contents"   # Heading text displayed above the table of contents (PDF only; Word uses Pandoc's native TOC, which supplies its own heading).
  depth: 3            # Number of heading levels shown in the TOC (PDF and Word).

headings:
  scale: [2, 1.5, 1.25, 1.1, 1, 0.85]     # h1 through h6 font sizes in em (PDF and Word).
  weight: [700, 700, 600, 600, 600, 600]   # h1 through h6 font weights. PDF only (Word heading weight comes from the heading font family).

links:
  underline: true     # Underline hyperlinks in both PDF and Word. Set false to remove the underline in both formats.
                      # Note for existing users: Pandoc's default Word hyperlink had no underline; the default true adds one to match the PDF. Set false to restore the old no-underline Word behavior.

density: "normal"     # Vertical rhythm preset: "compact", "normal", or "relaxed" (scales paragraph and block spacing). PDF and Word.

header:
  left: "docTitle"    # Running-header left slot. Keywords: docTitle, chapter, pageNumber, none. Or any literal text. (PDF and Word)
  center: "none"      # Running-header center slot.
  right: "chapter"    # Running-header right slot.

footer:
  left: "none"        # Running-footer left slot. Same keyword set as header. (PDF and Word)
  center: "pageNumber" # Running-footer center slot.
  right: "none"       # Running-footer right slot.

furniture:
  fontSize: "9pt"     # Running header and footer text size (PDF and Word).
  color: "#6b7280"    # Running header and footer text color (PDF and Word).

pageNumbers:
  restartAtBody: true # Restart page numbering at the first body page (cover and TOC are unnumbered front matter). Set false for continuous numbering. PDF and Word.

cover:
  layout: "spine"     # Cover layout: "spine" (brand-color bar down the left edge) or "plain" (no bar). PDF only (the Word cover is always plain).
  spineWidth: "16mm"  # Width of the cover spine bar. PDF only.
  logoWidth: "44mm"   # Cover logo width (PDF and Word).

badges:
  color: "muted"      # Badge border and text color: "accent", "muted", or a hex value. PDF only.

components:
  gap: 1              # Multiplier on the vertical spacing around component blocks (callouts, cards, panels, code groups, frames). PDF only.

# brand:
#   logo: ./logo.png       # Cover logo. Path is relative to THIS theme file (or absolute). PNG/JPG render in both PDF and Word; SVG is reliable in the PDF but iffy in Word.
#   productName: Dify      # Product name shown above the title on the cover (both formats). Omitted when unset.
# The release version and publish date are per-run, not brand-level: pass
#   --doc-version <v> and --date <d> (or set docVersion/date in a --config file).
# They print on the cover only when provided (the date is never auto-filled).

# tables:
#   layout: fixed  # Table column sizing for BOTH the PDF and Word: "fixed" (default) gives every table equal-width columns (via an injected colgroup) so a long token can't crush its neighbours or clip the last column; "auto" sizes columns to content. Cell text wraps in both.

